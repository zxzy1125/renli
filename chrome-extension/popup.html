<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
  <title>代招助手 - BOSS简历采集</title>
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <img src="icons/icon48.png" alt="logo" class="logo" />
      <h1>代招助手</h1>
    </div>

    <!-- 配置面板 -->
    <div id="configPanel" class="panel" style="display:none;">
      <h2>连接配置</h2>
      <label>服务器地址</label>
      <input type="text" id="apiUrl" placeholder="http://localhost:3001" />
      <label>登录 Token</label>
      <input type="password" id="apiToken" placeholder="Bearer token 或直接填 JWT" />
      <div class="btn-row">
        <button id="saveConfig" class="btn primary">保存配置</button>
        <button id="cancelConfig" class="btn">取消</button>
      </div>
    </div>

    <!-- 主面板 -->
    <div id="mainPanel" class="panel">
      <div id="status" class="status info">检测中...</div>

      <div id="candidatePreview" style="display:none;">
        <div class="preview-card">
          <div class="preview-name" id="previewName">-</div>
          <div class="preview-detail" id="previewDetail">-</div>
          <div class="preview-skills" id="previewSkills"></div>
        </div>
      </div>

      <button id="importBtn" class="btn primary" disabled>
        <span class="btn-icon">+</span> 导入简历
      </button>

      <div id="resultMsg" class="result-msg" style="display:none;"></div>

      <div class="footer">
        <a href="#" id="openSettings">设置</a>
        <span id="connectionStatus" class="conn-status">未配置</span>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
